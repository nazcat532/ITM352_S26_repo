<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Challenge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #timer { font-weight: bold; color: red; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-sm-12"> <div class="card shadow">
                <div class="card-body">
                    <div class="progress mb-3">
                        <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span id="question-count">Question 1</span>
                        <span id="timer-wrapper">Time Left: <span id="timer">15</span>s</span>
                    </div>

                    <h4 id="question-text" class="mb-4">Loading...</h4>
                    <div id="options-container" class="d-grid gap-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let timeLeft = 15;
let timerId;

async function startQuiz() {
    const response = await fetch('/api/questions'); // RESTful call 
    questions = await response.json();
    showQuestion();
}

function showQuestion() {
    if (currentIndex >= questions.length) return endQuiz("Quiz Complete!");
    
    const q = questions[currentIndex];
    document.getElementById('question-text').innerText = q.question;
    
    // Update Progress Bar 
    const percent = ((currentIndex) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = percent + "%";

    // Generate Buttons [cite: 14]
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-primary text-start';
        btn.innerText = opt;
        btn.onclick = () => nextQuestion();
        container.appendChild(btn);
    });

    resetTimer();
}

function resetTimer() {
    clearInterval(timerId);
    timeLeft = 15; // Set timer for 15 seconds [cite: 78]
    document.getElementById('timer').innerText = timeLeft;
    
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerId);
            endQuiz("Time ran out!"); // End quiz if timer hits zero [cite: 79]
        }
    }, 1000);
}

function nextQuestion() {
    currentIndex++;
    showQuestion();
}

function endQuiz(message) {
    document.getElementById('progress-bar').style.width = "100%";
    document.querySelector('.card-body').innerHTML = `<h3>${message}</h3><p>Your session is over.</p>`;
}

startQuiz();
</script>
</body>
</html>
